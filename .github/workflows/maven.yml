name: Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    
      # Step 1: Checkout
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      # Step 2: Setup JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # Step 3: Build with Maven
      - name: Build with Maven
        working-directory: ./DevOpsCalc
        run: mvn -B package

      # Step 4: Junit Test
      - name: Junit Test Dashboard
        uses: janisz/action@v2
        with:
          paths: DevOpsCalc/target/surefire-reports/*.xml
          output: test-results.md
          show: all

      # Step 5: Linting
      - name: Lint Code Base
        uses: github/super-linter@v4
        env:
          VALIDATE_ALL_CODEBASE: true
          DEFAULT_BRANCH: "main"
          GITHUB_TOKEN: ${{ secrets.DEVOPS_GITHUB }}

      # Step 6: SonarQube Scan
      - name: SonarQube Analysis
        working-directory: ./DevOpsCalc
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn sonar:sonar \
          -Dsonar.projectKey=DevOpsCalc \
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}
